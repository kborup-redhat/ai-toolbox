apiVersion: v1
kind: Service
metadata:
  name: ai-toolbox
  namespace: ai-toolbox
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: ai-toolbox-tls
  labels:
    app: ai-toolbox
spec:
  selector:
    app: ai-toolbox
  ports:
    - name: proxy
      port: 8443
      targetPort: 8443
      protocol: TCP
