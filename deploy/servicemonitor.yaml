apiVersion: v1
kind: Service
metadata:
  name: ai-toolbox-metrics
  namespace: ai-toolbox
  labels:
    app: ai-toolbox
spec:
  selector:
    app: ai-toolbox
  ports:
    - name: metrics
      port: 8081
      targetPort: 8081
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ai-toolbox
  namespace: ai-toolbox
  labels:
    app: ai-toolbox
spec:
  selector:
    matchLabels:
      app: ai-toolbox
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
  namespaceSelector:
    matchNames:
      - ai-toolbox
